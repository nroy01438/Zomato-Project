# Render blueprint — restaurant recommendation API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: restaurant-api
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LLM_PROVIDER
        value: groq
      - key: DATA_CSV_PATH
        value: phase1/data/processed/restaurants_processed.csv
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app,http://localhost:3000
      - key: GROQ_API_KEY
        sync: false
